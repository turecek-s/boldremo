    <!-- Critical inline CSS for above-the-fold content - eliminates render blocking -->
    <style>
      /* System font stack fallback to prevent layout shift */
      :root {
        --font-serif: 'Cormorant Garamond', ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif;
        --font-sans: 'Montserrat', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
      /* Critical above-the-fold styles */
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      html { scroll-behavior: smooth; }
      body { 
        font-family: var(--font-sans);
        background: hsl(40 20% 98%);
        color: hsl(220 50% 15%);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, h4, h5, h6 { font-family: var(--font-serif); }
      /* Hero section critical styles for LCP */
      .min-h-screen { min-height: 100vh; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-center { justify-content: center; }
      .relative { position: relative; }
      .absolute { position: absolute; }
      .inset-0 { inset: 0; }
      .overflow-hidden { overflow: hidden; }
      .w-full { width: 100%; }
      .h-full { height: 100%; }
      .object-cover { object-fit: cover; }
      .text-center { text-align: center; }
    </style>
